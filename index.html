<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="/pomo-pod/manifest.webmanifest">
  <meta name="theme-color" content="#b7eadc">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Pomo Pod">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <link rel="apple-touch-icon" href="/pomo-pod/assets/icon.png">

  <link rel="stylesheet" href="style.css" />
  <title>Pomo Pod</title>
</head>

<body>
  <div class="ipod">
    <div class="screen">
      <div class="screen-topbar">
        <span>Now Playing</span>

        <div class="top-icons">
          <span class="play-triangle"></span>

          <div class="battery">
            <div class="battery-fill"></div>
          </div>
        </div>
      </div>

      <div class="screen-content">

        <div class="album-section">
          <img id="character" src="assets/img.jpg" />
        </div>

        <div class="info-section">
          <div class="track-title">Focus Time</div>
          <div class="track-subtitle">Pomodoro Session</div>
          <div class="track-album">Study Mode</div>
          <div id="photo-count">1 of 14</div>
        </div>

        <div class="timer-ui">
          <div id="elapsed-time">00:00</div>

          <div class="progress-bar">
            <div id="progress-fill"></div>
          </div>

          <div id="remaining-time">-15:00</div>
        </div>

      </div>
    </div>

    <div class="wheel">
      <div class="wheel-label menu">MENU</div>
      <div class="wheel-label prev">⏮&#xFE0E;</div>
      <div class="wheel-label next">⏭&#xFE0E;</div>

      <button class="wheel-label play">
        <span class="play-icon">▶&#xFE0E;</span>
        <span class="pause-icon">⏸&#xFE0E;</span>
      </button>

      <div class="center-circle"></div>
    </div>
  </div>

  <script src="renderer.js"></script>

</body>

</html>
